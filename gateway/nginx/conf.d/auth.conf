server {
    listen 8080;

    # ── Login → sign token ────────────────────────────────────────
    location /auth/login {
        content_by_lua_block {
            local auth  = require "auth"
            local cjson = require "cjson"

            ngx.req.read_body()
            local body   = cjson.decode(ngx.req.get_body_data())
            local token  = auth.sign(body.user_id, body.role)

            ngx.status = 200
            ngx.say(cjson.encode({ access_token = token }))
        }
    }

    # ── Verify token ──────────────────────────────────────────────
    location /auth/verify {
        content_by_lua_block {
            local auth = require "auth"
            auth.require_auth()   -- no role = just check valid token
        }
    }

    # ── Protected admin route ─────────────────────────────────────
    location /auth/admin {
        access_by_lua_block {
            local auth = require "auth"
            auth.require_auth("admin")   -- only admin role passes
        }

        content_by_lua_block {
            ngx.say("welcome admin")
        }
    }

    # ── Refresh token ─────────────────────────────────────────────
    location /auth/refresh {
        content_by_lua_block {
            local auth = require "auth"
            auth.refresh()
        }
    }

    # ── Logout / revoke ───────────────────────────────────────────
    location /auth/logout {
        content_by_lua_block {
            local auth        = require "auth"
            local auth_header = ngx.req.get_headers()["Authorization"]
            local token       = auth_header:match("Bearer%s+(.+)")

            auth.revoke(token)
            ngx.say("logged out")
        }
    }
}