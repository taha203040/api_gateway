events {
    worker_connections 1024;
}

http {
    log_format main '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log debug;
    limit_req_zone $binary_remote_addr zone=checkout:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
    limit_conn_zone $binary_remote_addr zone=connc_lm:10m;

    upstream checkout_service {
        server checkout:3002;
    }
    upstream auth_service {
        server auth:3001;
    }


    server {
        listen 80;
        location /checkout {
            limit_conn connc_lm 2;
            limit_req zone=checkout;
            auth_request /auth-verify;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Authorization $http_authorization;
            proxy_pass http://checkout_service/;
            error_page 401 = @errors401;
        }

        location /auth/login {
            limit_req zone=auth;
            limit_conn connc_lm 2;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://auth_service/login;
        }
        location /auth/signup {
            # limit_req zone=auth;
            # limit_conn connc_lm 2;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://auth_service/auth/signup;
        }
        # internal route
        location /auth-verify {
            # internal;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://auth_service/auth/verify;
            proxy_pass_request_body off;
        }
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
    }

}

